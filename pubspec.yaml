name: marnie_pos
description: Marnie Store POS System with Offline Support
version: 2.1.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  mobile_scanner: ^4.0.1
  provider: ^6.1.0
  intl: ^0.18.0
  connectivity_plus: ^5.0.0
  pdf: ^3.10.4
  printing: ^5.11.1
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
