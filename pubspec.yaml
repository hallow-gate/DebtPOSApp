name: marnie_pos
description: Marnie Store POS System with Offline Support
version: 2.1.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.0
  mobile_scanner: ^4.0.1
  google_fonts: ^6.1.0
  intl: ^0.18.0
  connectivity_plus: ^5.0.0
  path_provider: ^2.1.0
  cupertino_icons: ^1.0.6
  
  # Thermal Printing - Use simpler approach
  esc_pos_utils: ^1.1.0
  # Remove esc_pos_bluetooth for now - it's causing issues
  # esc_pos_bluetooth: ^0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
